version: "3.9"

services:
  api:
    build: ./app
    container_name: xcpro-api
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/xcpro

  db:
    image: postgres:15
    container_name: xcpro-db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xcpro
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: xcpro-redis
    restart: always

volumes:
  pgdata:
