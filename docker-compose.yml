services:
  api:
    restart: unless-stopped
    build: ./app
    container_name: xcpro-api
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}

  db:
    image: postgres:15
    container_name: xcpro-db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: xcpro-redis
    restart: always

volumes:
  pgdata: